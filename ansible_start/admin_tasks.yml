---
- name: Адміністрування системи Linux
  hosts: my_computers
  become: yes                # Розжовуємо: "Стати суперкористувачем (root)"
  
  tasks:
    - name: Встановити htop (просунутий монітор процесів)
      apt:                   # Розжовуємо: Модуль для керування пакетами (програмами)
        name: htop           # Назва програми
        state: present       # Стан: "має бути в наявності"

    - name: Створити нового користувача для розробки
      user:                  # Розжовуємо: Модуль для керування користувачами
        name: dev_user       # Ім'я нового юзера
        shell: /bin/bash     # Яку оболонку йому дати (стандарт для Linux)
        state: present       # Стан: "користувач має існувати"
