---
- name: Очищення системи
  hosts: my_computers
  become: yes

  tasks:
    - name: Видалити старі тимчасові файли
      file:                 # Модуль для роботи з файлами та папками
        path: /tmp/ansible_test.txt  # Шлях до файлу (пам'ятаєш, ми його створювали?)
        state: absent       # Стан: "має бути відсутнім" (видалити)

    - name: Очистити кеш пакетного менеджера apt
      apt:
        autoclean: yes      # Видалити старі інсталяційні файли, які вже не потрібні

    - name: Повне очищення кешу пакетів (видаляє всі завантажені .deb файли)
      apt:
        clean: yes           # Розжовуємо: Це радикальніше за autoclean. Видаляє все з кешу.

    - name: Очистити системні логи (залишити тільки останні 2 дні)
      shell: "journalctl --vacuum-time=2d"
      # Розжовуємо: journalctl - це менеджер логів. Vacuum - це команда "прибрати".

    - name: Очистити сміття Docker (тільки якщо Docker встановлено)
      shell: "docker system prune -f"
      ignore_errors: yes     # Розжовуємо: Якщо докера немає, Ansible просто піде далі.

    - name: Додати автоматичне очищення кешу щонеділі
      cron:                   # Модуль для планувальника завдань
        name: "Weekly APT cleanup"
        minute: "0"
        hour: "23"
        weekday: "0"          # 0 - це неділя
        user: root
        job: "apt-get autoclean" # Яку команду виконувати
